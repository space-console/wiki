name: Publish docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages via the artifact (Pages source: GitHub Actions).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # Enables GitHub Pages with the "GitHub Actions" (workflow) source on first run.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build site
        run: docfx docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
